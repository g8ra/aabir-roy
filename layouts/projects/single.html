{{ define "main" }}
{{ if not .Params.menu }}
<h1>{{ .Title }}</h1>
{{ end }}
<content>
  {{ .Content }}
</content>

{{ if (.Param "enablePostNavigator")}}
{{- partial "post_navigator.html" . -}}
{{ end }}

<p>
  {{ range (.GetTerms "tags") }}
  <a href="{{ .Permalink }}">#{{ .LinkTitle }}</a>
  {{ end }}
</p>
{{ end }}
